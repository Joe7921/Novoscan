name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: ESLint 代码检查
        run: npm run lint -- --quiet || true

      - name: 单元测试
        run: npm test

      - name: 生产构建
        run: npm run build
        env:
          # 构建时需要的最小环境变量
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  sql-check:
    name: SQL 迁移语法检查
    runs-on: ubuntu-latest
    # 仅当 migrations/ 目录有变更时运行
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 安装 pg_format (pgFormatter)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libpg-query-dev 2>/dev/null || true
          # 安装 pgFormatter（Perl 版，兼容性最好）
          sudo apt-get install -y -qq pgformatter 2>/dev/null || {
            # 如果包不可用，从 GitHub 安装
            git clone --depth 1 https://github.com/darold/pgFormatter.git /tmp/pgFormatter
            cd /tmp/pgFormatter && sudo perl Makefile.PL && sudo make && sudo make install
          }

      - name: 检查 SQL 文件语法
        run: |
          echo "🔍 检查 migrations/ 目录下的 SQL 文件..."
          EXIT_CODE=0
          for file in migrations/*.sql; do
            if [ -f "$file" ]; then
              echo "  📄 检查: $file"
              # 使用 pg_format 解析 SQL，如果有语法错误会输出到 stderr
              pg_format --no-space-function "$file" > /dev/null 2>&1
              if [ $? -ne 0 ]; then
                echo "  ❌ 语法错误: $file"
                pg_format "$file" 2>&1 | head -20
                EXIT_CODE=1
              else
                echo "  ✅ 通过: $file"
              fi
            fi
          done
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ SQL 语法检查失败！请修复上述文件的语法错误。"
            exit 1
          fi
          echo ""
          echo "✅ 所有 SQL 迁移文件语法检查通过！"

  e2e:
    name: E2E 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 运行 E2E 测试
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  rust-wasm:
    name: Rust WASM 构建 + 测试
    runs-on: ubuntu-latest
    # 仅当 Rust 相关文件变更时运行
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files_names || '', 'rust/')
    defaults:
      run:
        working-directory: rust/novoscan-core
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 缓存 Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/novoscan-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/novoscan-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust 单元测试
        run: cargo test

      - name: 安装 wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: WASM 构建 (Node.js)
        run: wasm-pack build --target nodejs --out-dir ../../pkg/novoscan-core

      - name: WASM 构建 (浏览器)
        run: wasm-pack build --target web --out-dir ../../pkg/novoscan-core-web

      - name: 验证 WASM 产物
        run: |
          echo "📦 Node.js WASM 包:"
          ls -lh ../../pkg/novoscan-core/
          echo "🌐 Browser WASM 包:"
          ls -lh ../../pkg/novoscan-core-web/

# ============================================================
# Novoscan — Docker Compose 一键启动
#
# 用法：
#   1. cp .env.docker .env
#   2. 编辑 .env 填入 AI 密钥（可选，默认 Mock 模式）
#   3. docker compose up -d
#   4. 打开 http://localhost:3000
#
# 服务访问：
#   - Novoscan UI:  http://localhost:3000
#   - PostgreSQL:   localhost:5432
#   - Redis:        localhost:6379
# ============================================================

services:
  # ────────────────── PostgreSQL 16 ──────────────────
  db:
    image: postgres:16-alpine
    container_name: novoscan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novoscan}
      POSTGRES_USER: ${POSTGRES_USER:-novoscan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novoscan_secret_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - novoscan-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novoscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ────────────────── Redis 7 ──────────────────
  redis:
    image: redis:7-alpine
    container_name: novoscan-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - novoscan-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────── Novoscan 应用 ──────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
    container_name: novoscan-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      # ── 站点 ──
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # ── 数据库（Docker 内部网络）──
      DATABASE_URL: postgresql://${POSTGRES_USER:-novoscan}:${POSTGRES_PASSWORD:-novoscan_secret_2026}@db:5432/${POSTGRES_DB:-novoscan}
      DATABASE_PROVIDER: postgres
      # ── 认证（默认关闭）──
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED:-false}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-nextauth}
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-in-production}
      # ── Mock AI ──
      MOCK_AI: ${MOCK_AI:-true}
      # ── AI 密钥 ──
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      # ── 数据源 ──
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      OPENALEX_EMAIL: ${OPENALEX_EMAIL:-}
      CROSSREF_EMAIL: ${CROSSREF_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

# ────────────────── 持久化数据卷 ──────────────────
volumes:
  novoscan-pgdata:
    driver: local
  novoscan-redis-data:
    driver: local

# ============================================================
# Novoscan Redis 配置
# 用于 Docker Compose 自建 Redis 服务
# ============================================================

# 网络 — Docker 内部网络，不暴露到宿主机外部
bind 0.0.0.0
protected-mode no

# 持久化 — AOF（追加日志）
appendonly yes
appendfsync everysec

# 内存限制 — 默认 256MB，可根据服务器配置调整
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 连接
timeout 300
tcp-keepalive 60
